<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecondAvenue — Logótipo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            margin-bottom: 60px;
        }

        /* ── Big logo ── */
        .logo-box {
            width: 320px;
            height: 320px;
            background: linear-gradient(135deg, #a8aef5, #5170ff);
            border-radius: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px rgba(26, 26, 46, 0.2);
            transition: transform 0.3s ease;
            cursor: default;
        }

        .logo-box:hover {
            transform: scale(1.02);
        }

        .logo-box .s {
            color: #ffffff;
            font-size: 240px;
            font-weight: 900;
            line-height: 1;
            margin-top: -10px;
            letter-spacing: -4px;
            user-select: none;
        }

        .logo-name {
            font-size: 36px;
            font-weight: 900;
            color: #1a1a2e;
            letter-spacing: 2px;
            text-transform: lowercase;
        }

        /* ── Download buttons ── */
        .download-section {
            text-align: center;
        }

        .download-section h2 {
            font-size: 18px;
            color: #1a1a2e;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            background: #ffffff;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .btn-primary {
            background: linear-gradient(135deg, #a8aef5, #5170ff);
            color: #ffffff;
        }

        .btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .divider {
            width: 100%;
            max-width: 500px;
            height: 1px;
            background: #e0e0e0;
            margin: 40px 0;
        }

        .info {
            text-align: center;
            color: #888;
            font-size: 13px;
            max-width: 400px;
            line-height: 1.6;
        }

        /* ── PNG preview ── */
        #preview-canvas {
            display: none;
        }

        @media (max-width: 480px) {
            .logo-box {
                width: 220px;
                height: 220px;
                border-radius: 48px;
            }
            .logo-box .s {
                font-size: 160px;
                margin-top: -6px;
            }
            .logo-name {
                font-size: 26px;
            }
            .btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- Big logo -->
        <div class="logo-box" id="logo-box">
            <span class="s">s</span>
        </div>
        <div class="logo-name">secondavenue</div>
    </div>

        <p>📐 O logótipo SecondAvenue em formato SVG vetorial.<br>Podes redimensionar para qualquer tamanho sem perder qualidade.</p>

    </div>

    <!-- Hidden canvas for PNG export -->
    <canvas id="preview-canvas"></canvas>

    <script>
        async function downloadPNG() {
            const canvas = document.getElementById('preview-canvas');
            const ctx = canvas.getContext('2d');
            const size = 1024;
            canvas.width = size;
            canvas.height = size + 80; // room for brand name

            // Background
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Logo rounded rect
            const logoSize = size * 0.8;
            const logoX = (size - logoSize) / 2;
            const logoY = 20;
            const radius = logoSize * 0.22;

            // Shadow
            ctx.shadowColor = 'rgba(26, 26, 46, 0.2)';
            ctx.shadowBlur = 30;
            ctx.shadowOffsetY = 8;

            // Gradient background
            const grad = ctx.createLinearGradient(logoX, logoY, logoX + logoSize, logoY + logoSize);
            grad.addColorStop(0, '#a8aef5');
            grad.addColorStop(1, '#5170ff');

            ctx.beginPath();
            ctx.moveTo(logoX + radius, logoY);
            ctx.lineTo(logoX + logoSize - radius, logoY);
            ctx.quadraticCurveTo(logoX + logoSize, logoY, logoX + logoSize, logoY + radius);
            ctx.lineTo(logoX + logoSize, logoY + logoSize - radius);
            ctx.quadraticCurveTo(logoX + logoSize, logoY + logoSize, logoX + logoSize - radius, logoY + logoSize);
            ctx.lineTo(logoX + radius, logoY + logoSize);
            ctx.quadraticCurveTo(logoX, logoY + logoSize, logoX, logoY + logoSize - radius);
            ctx.lineTo(logoX, logoY + radius);
            ctx.quadraticCurveTo(logoX, logoY, logoX + radius, logoY);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            // Reset shadow for text
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            // Letter "s"
            ctx.fillStyle = '#ffffff';
            ctx.font = `900 ${logoSize * 0.65}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('s', size / 2, logoY + logoSize / 2 + 4);

            // Brand name
            ctx.fillStyle = '#1a1a2e';
            ctx.font = `900 ${size * 0.036}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif`;
            ctx.fillText('secondavenue', size / 2, logoY + logoSize + 55);

            // Create download link
            const link = document.createElement('a');
            link.download = 'secondavenue-logo.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
